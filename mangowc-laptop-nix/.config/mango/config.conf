shadows=1
layer_shadows=1
gappoh=5
appov=10
borderpx=2

rootcolor=0xeff1f5ff
bordercolor=0x9ca0b0ff
focuscolor=0xea76cbff
urgentcolor=0xd20f39ff
scratchpadcolor=0x9ca0b0ff
globalcolor=0x9ca0b0ff
coverlayercolor=0x9ca0b0ff

windowrule=isterm:1,appid:Alacritty
monitorrule=name:eDP-1,refresh:60,scale:1

tap_to_click=0
tap_and_drag=0
trackpad_natural_scrolling=1

xkb_rules_layout=us,us
xkb_rules_variant=colemak_dh,
xkb_rules_options=grp:win_space_toggle

exec-once=quickshell -n -c /home/ki11errabbit/.config/quickshell/getting-ready/
exec-once=noctalia-shell
exec-once=/home/ki11errabbit/.local/bin/configure-monitors.sh
exec-once=/home/ki11errabbit/.local/bin/setup-wallpaper.sh
exec-once=/home/ki11errabbit/.local/bin/setup-swayidle.sh
exec-once=/home/ki11errabbit/.local/bin/setup-keyboard.sh
exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=mango
exec-once=systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once=/usr/lib/xdg-desktop-portal-wlr
exec-once=/usr/lib/xdg-desktop-portal

bind=SUPER,q,killclient
bind=SUPER,Return,spawn,alacritty
