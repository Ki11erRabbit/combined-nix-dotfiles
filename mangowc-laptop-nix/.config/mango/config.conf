bind=NONE,code:122,spawn,qs -c noctalia-shell ipc call volume decrease
bind=NONE,code:121,spawn,qs -c noctalia-shell ipc call volume muteOutput

bind=NONE,code:232,spawn,qs -c noctalia-shell ipc call brightness increase
bind=NONE,code:233,spawn,qs -c noctalia-shell ipc call brightness decrease


