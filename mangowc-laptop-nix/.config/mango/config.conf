bind=SUPER+SHIFT,code:43,exchange_client,left
# i
bind=SUPER+SHIFT,code:46,exchange_client,right
# n
bind=SUPER+CTRL,code:44,focusdir,down
# e
bind=SUPER+CTRL,code:45,focusdir,up
# m
bind=SUPER+CTRL,code:43,focusdir,left
# i
bind=SUPER+CTRL,code:46,focusdir,right
bind=SUPER+CTRL,Return,zoom

# u
bind=SUPER,code:31,viewtoright
# l
